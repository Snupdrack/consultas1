services:
  - type: web
    name: nubarium-gateway-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "cd backend && pip install -r requeriments.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: NUBARIUM_USER
        sync: false
      - key: NUBARIUM_PASS
        sync: false
      - key: PUBLIC_BASE_URL
        fromService:
          type: web
          name: nubarium-gateway-backend
          property: url
      - key: WEBHOOK_TOKEN
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          type: static
          name: nubarium-gateway-frontend
          property: url
  - type: static
    name: nubarium-gateway-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: "cd frontend && ./build.sh"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /
        destination: /index.html
    envVars:
      - key: API_BASE
        fromService:
          type: web
          name: nubarium-gateway-backend
          property: url